name: Build and Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - StreamFlix-build/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate version
        id: version
        run: |
          VERSION="$(date +%Y.%m.%d).${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate build
        run: |
          test -d StreamFlix-build
          test -f StreamFlix-build/index.html
      - name: Create archive
        run: |
          mkdir -p dist
          tar -czf "dist/streamflix-${{ needs.build.outputs.version }}.tar.gz" StreamFlix-build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-${{ needs.build.outputs.version }}
          path: dist/streamflix-${{ needs.build.outputs.version }}.tar.gz
          retention-days: 30

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate files
        run: |
          test -f StreamFlix-build/index.html
          test -f StreamFlix-build/manifest.json
          for json in $(find StreamFlix-build -name "*.json"); do
            python3 -m json.tool "$json" > /dev/null
          done

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, package, quality]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: streamflix-${{ needs.build.outputs.version }}
          path: release-artifact
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          body: Build ${{ needs.build.outputs.version }}
          artifacts: release-artifact/streamflix-${{ needs.build.outputs.version }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  deploy:
    name: Deploy to IIS
    runs-on: [self-hosted, windows]
    needs: [build, release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: streamflix-${{ needs.build.outputs.version }}
          path: deploy-artifact
      - name: Extract archive
        shell: powershell
        run: |
          $archive = Get-ChildItem -Path deploy-artifact -Recurse -Filter "streamflix-*.tar.gz" | Select-Object -First 1
          if (-not $archive) { throw "Archive not found" }
          $deployRoot = Join-Path $env:TEMP "streamflix-deploy"
          if (Test-Path $deployRoot) { Remove-Item $deployRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $deployRoot -Force | Out-Null
          tar -xzf $archive.FullName -C $deployRoot
      - name: Backup current site
        shell: powershell
        run: |
          $wwwroot = "C:\inetpub\wwwroot"
          if (Test-Path $wwwroot) {
            if (-not (Test-Path "C:\backups")) { New-Item -ItemType Directory -Path "C:\backups" | Out-Null }
            $date = Get-Date -Format yyyyMMdd-HHmm
            Copy-Item -Path $wwwroot -Destination "C:\backups\streamflix-$date" -Recurse -Force
          }
      - name: Copy files
        shell: powershell
        run: |
          $source = "$env:TEMP\streamflix-deploy\StreamFlix-build\*"
          $dest = "C:\inetpub\wwwroot"
          if (-not (Test-Path $dest)) { New-Item -ItemType Directory -Path $dest | Out-Null }
          Copy-Item -Path $source -Destination $dest -Recurse -Force
      - name: Restart IIS app pool
        shell: powershell
        run: |
          Stop-WebAppPool -Name DefaultAppPool -ErrorAction SilentlyContinue
          Start-WebAppPool -Name DefaultAppPool -ErrorAction SilentlyContinue
